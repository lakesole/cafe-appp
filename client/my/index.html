<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마이페이지 | CafeOrder</title>
  <link rel="stylesheet" href="/shared/reset.css" />
  <link rel="stylesheet" href="/index.css" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="/" class="logo">☕ CafeOrder</a>
      <nav class="site-nav">
        <a href="/menus/list" class="site-nav__link">메뉴</a>
        <a href="/orders/list" class="site-nav__link">주문내역</a>
        <a href="/my" class="site-nav__link">마이</a>
        <a href="/auth/login" class="site-nav__link">로그인</a>
        <a href="/basket/list" class="site-nav__link cart-link">
          🛒 <span id="cart-count" class="cart-count">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="profile-card">
      <div class="profile-avatar">👤</div>
      <div>
        <p class="profile-name">김민준</p>
        <p class="profile-email">minjun@example.com</p>
      </div>
    </section>

    <section class="my-section">
      <div class="my-section__head">
        <h2>최근 주문</h2>
        <a href="/orders/list" class="see-all">전체보기 →</a>
      </div>
      <ul class="recent-orders" id="recent-orders"></ul>
    </section>

    <section class="my-section">
      <h2>바로가기</h2>
      <div class="quick-links">
        <a href="/orders/list" class="quick-link">📋 주문 내역</a>
        <a href="/basket/list" class="quick-link">🛒 장바구니</a>
        <a href="/auth/login" class="quick-link">🔑 로그아웃</a>
      </div>
    </section>
  </main>

  <script src="/shared/sample-data.js"></script>
  <script src="/shared/cart.js"></script>
  <script src="index.js"></script>
</body>
</html>
