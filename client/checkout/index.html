<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주문서 작성 | New Lake Coffee</title>
  <link rel="stylesheet" href="/shared/reset.css" />
  <link rel="stylesheet" href="/index.css" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="app-sidebar">
      <a href="/" class="app-sidebar__logo">New Lake<span class="app-sidebar__logo-sub">Coffee</span></a>
      <nav class="app-sidebar__nav">
        <a href="/" class="app-nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-7 9 7" /><path d="M5 10v10h14V10" /></svg>
          홈
        </a>
        <a href="/menus/list" class="app-nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="16" height="16" rx="3" /><path d="M4 10h16" /></svg>
          메뉴
        </a>
        <a href="/visit" class="app-nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-6.5-7-11a7 7 0 0 1 14 0c0 4.5-7 11-7 11Z" /><circle cx="12" cy="10" r="2.6" /></svg>
          오시는 길
        </a>
        <a href="/basket/list" class="app-nav-link is-active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="20" r="1.4" /><circle cx="18" cy="20" r="1.4" /><path d="M2 3h2l2.4 12.4a2 2 0 0 0 2 1.6h8.6a2 2 0 0 0 2-1.6L21 7H5.2" /></svg>
          장바구니
          <span id="cart-count" class="app-nav-link__badge">0</span>
        </a>
        <a href="/orders/list" class="app-nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16v14l-4-3H4z" /><path d="M8 9h8M8 12h5" /></svg>
          주문내역
        </a>
        <a href="/my" class="app-nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.4" /><path d="M5 20c1.2-4 4-6 7-6s5.8 2 7 6" /></svg>
          마이페이지
        </a>
      </nav>
      <div class="app-sidebar__spacer"></div>
      <a href="/auth/login" class="app-sidebar__user" id="nav-auth-link">
        <span class="app-sidebar__avatar">👤</span>
        <span>
          <strong id="nav-auth-name">로그인</strong><br />
          <span id="nav-auth-status">계정에 접속하세요</span>
        </span>
      </a>
    </aside>

    <nav class="app-bottom-nav">
      <a href="/" class="app-bottom-nav__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-7 9 7" /><path d="M5 10v10h14V10" /></svg>
        <span>홈</span>
      </a>
      <a href="/menus/list" class="app-bottom-nav__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="16" height="16" rx="3" /><path d="M4 10h16" /></svg>
        <span>메뉴</span>
      </a>
      <a href="/visit" class="app-bottom-nav__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-6.5-7-11a7 7 0 0 1 14 0c0 4.5-7 11-7 11Z" /><circle cx="12" cy="10" r="2.6" /></svg>
        <span>위치</span>
      </a>
      <a href="/basket/list" class="app-bottom-nav__link is-active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="20" r="1.4" /><circle cx="18" cy="20" r="1.4" /><path d="M2 3h2l2.4 12.4a2 2 0 0 0 2 1.6h8.6a2 2 0 0 0 2-1.6L21 7H5.2" /></svg>
        <span>장바구니</span>
        <span class="app-nav-link__badge app-bottom-nav__badge">0</span>
      </a>
      <a href="/orders/list" class="app-bottom-nav__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16v14l-4-3H4z" /><path d="M8 9h8M8 12h5" /></svg>
        <span>주문내역</span>
      </a>
      <a href="/my" class="app-bottom-nav__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.4" /><path d="M5 20c1.2-4 4-6 7-6s5.8 2 7 6" /></svg>
        <span>마이</span>
      </a>
    </nav>

    <div class="app-main">
      <main class="page">
        <h1 class="page-title">주문서 작성</h1>

    <div class="checkout-layout">
      <section class="checkout-section">
        <h2 class="section-title">주문 상품</h2>
        <ul class="order-items" id="order-items"></ul>
      </section>

      <section class="checkout-section">
        <div class="section-title-row">
          <h2 class="section-title">주문 방식</h2>
          <span class="seat-badge" id="checkout-seat-badge" hidden></span>
        </div>
        <label class="pay-method">
          <input type="radio" name="order-type" value="TAKEOUT" checked />
          포장
        </label>
        <label class="pay-method">
          <input type="radio" name="order-type" value="DINE_IN" />
          매장식사
        </label>
      </section>

      <section class="checkout-section">
        <h2 class="section-title">픽업 시간</h2>
        <select id="pickup-time" class="pickup-select">
          <option value="15">15분 후</option>
          <option value="30" selected>30분 후</option>
          <option value="45">45분 후</option>
          <option value="60">60분 후</option>
        </select>
      </section>

      <section class="checkout-section">
        <h2 class="section-title">결제 방법 (모의 결제)</h2>
        <label class="pay-method">
          <input type="radio" name="pay-method" value="CARD" checked />
          신용/체크카드
        </label>
        <label class="pay-method">
          <input type="radio" name="pay-method" value="KAKAO" />
          카카오페이
        </label>
      </section>

      <aside class="checkout-summary">
        <div class="summary-row">
          <span>총 수량</span>
          <span id="summary-count">0개</span>
        </div>
        <div class="summary-row summary-row--total">
          <span>결제 금액</span>
          <span id="summary-total">0원</span>
        </div>
        <button type="button" class="btn btn-primary summary-checkout" id="btn-pay">결제하기</button>
      </aside>
    </div>

        <p class="empty" id="empty" hidden>
          장바구니가 비어있어 주문할 수 없어요.<br />
          <a href="/menus/list" class="back-link">메뉴 보러가기 →</a>
        </p>

        <footer class="app-footer">
          <p>© <span id="footer-year"></span> New Lake Coffee. All rights reserved.</p>
        </footer>
      </main>
    </div>
  </div>

  <script src="/shared/api.js"></script>
  <script src="/shared/auth.js"></script>
  <script src="/shared/cart.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/shared/notify.js"></script>
  <script src="index.js"></script>
</body>
</html>
