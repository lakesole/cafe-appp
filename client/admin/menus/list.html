<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메뉴 관리 - New Lake</title>
  <link rel="stylesheet" href="/shared/reset.css" />
  <link rel="stylesheet" href="/admin/index.css" />
  <link rel="stylesheet" href="list.css" />
</head>
<body>
  <header class="admin-header">
    <h1>New Lake Coffee</h1>
    <div class="admin-header__actions">
      <a href="/" class="admin-header__btn">메인 페이지</a>
      <button type="button" id="logout-btn" class="admin-header__btn">로그아웃</button>
    </div>
  </header>
  <nav class="admin-nav">
    <a href="/admin">대시보드</a>
    <a href="/admin/categories/list">카테고리 관리</a>
    <a href="/admin/menus/list" class="is-active">메뉴 관리</a>
    <a href="/admin/orders/list">주문 관리</a>
    <a href="/admin/staff/list">종업원 관리</a>
    <a href="/admin/qna/list">QnA 관리</a>
    <a href="/admin/stats">매출 통계</a>
  </nav>
  <main class="admin-main">
    <div class="page-title-row">
      <h2>메뉴 목록</h2>
      <a class="btn" href="/admin/menus/create">+ 메뉴 등록</a>
    </div>

    <div class="menu-manage-layout">
      <aside class="category-filter" id="category-filter"></aside>

      <div class="menu-manage-content">
        <div class="admin-table-scroll">
          <table id="menu-table">
            <thead>
              <tr>
                <th></th>
                <th>이름</th>
                <th>카테고리</th>
                <th>가격</th>
                <th>상태</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="menu-table-body"></tbody>
          </table>
        </div>
        <p class="empty" id="empty" hidden>해당 카테고리에 메뉴가 없습니다.</p>
      </div>
    </div>
  </main>
  <script src="/shared/api.js"></script>
  <script src="/shared/auth.js"></script>
  <script src="list.js"></script>
</body>
</html>
