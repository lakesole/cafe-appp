<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>종업원 수정 - New Lake</title>
  <link rel="stylesheet" href="/shared/reset.css" />
  <link rel="stylesheet" href="/admin/index.css" />
  <link rel="stylesheet" href="/admin/staff/create.css" />
</head>
<body>
  <header class="admin-header">
    <h1>New Lake Coffee</h1>
  </header>
  <nav class="admin-nav">
    <a href="/admin">대시보드</a>
    <a href="/admin/categories/list">카테고리 관리</a>
    <a href="/admin/menus/list">메뉴 관리</a>
    <a href="/admin/orders/list">주문 관리</a>
    <a href="/admin/staff/list" class="is-active">종업원 관리</a>
    <a href="/admin/qna/list">QnA 관리</a>
    <a href="/admin/stats">매출 통계</a>
  </nav>
  <main class="admin-main">
    <h2>종업원 수정</h2>
    <form id="staff-form">
      <label>이름 <input type="text" name="name" required /></label>
      <label>아이디 <input type="text" name="username" required /></label>
      <label>
        역할
        <select name="role">
          <option value="STAFF">STAFF</option>
          <option value="ADMIN">ADMIN</option>
        </select>
      </label>
      <button type="submit" class="btn">저장</button>
    </form>
  </main>
  <script src="/shared/api.js"></script>
  <script src="/shared/auth.js"></script>
  <script src="/shared/cart.js"></script>
  <script src="edit.js"></script>
</body>
</html>
