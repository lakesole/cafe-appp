<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장바구니 | CafeOrder</title>
  <link rel="stylesheet" href="/shared/reset.css" />
  <link rel="stylesheet" href="/index.css" />
  <link rel="stylesheet" href="list.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="/" class="logo">☕ CafeOrder</a>
      <nav class="site-nav">
        <a href="/menus/list" class="site-nav__link">메뉴</a>
        <a href="/orders/list" class="site-nav__link">주문내역</a>
        <a href="/my" class="site-nav__link">마이</a>
        <a href="/auth/login" class="site-nav__link" id="nav-auth-link">로그인</a>
        <a href="/basket/list" class="site-nav__link cart-link">
          🛒 <span id="cart-count" class="cart-count">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="page">
    <h1 class="page-title">장바구니</h1>

    <div class="basket-layout">
      <ul class="basket-list" id="basket-list"></ul>

      <aside class="basket-summary">
        <div class="summary-row">
          <span>총 수량</span>
          <span id="summary-count">0개</span>
        </div>
        <div class="summary-row summary-row--total">
          <span>총 금액</span>
          <span id="summary-total">0원</span>
        </div>
        <button type="button" class="btn btn-primary summary-checkout" id="btn-checkout">주문하기</button>
      </aside>
    </div>

    <p class="empty" id="empty" hidden>
      장바구니가 비어있어요.<br />
      <a href="/menus/list" class="back-link">메뉴 보러가기 →</a>
    </p>
  </main>

  <script src="/shared/sample-data.js"></script>
  <script src="/shared/api.js"></script>
  <script src="/shared/auth.js"></script>
  <script src="/shared/cart.js"></script>
  <script src="list.js"></script>
</body>
</html>
