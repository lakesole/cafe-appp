<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 | CafeOrder</title>
  <link rel="stylesheet" href="/shared/reset.css" />
  <link rel="stylesheet" href="/index.css" />
  <link rel="stylesheet" href="login.css" />
  <link rel="stylesheet" href="signup.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="/" class="logo">☕ CafeOrder</a>
      <nav class="site-nav">
        <a href="/menus/list" class="site-nav__link">메뉴</a>
        <a href="/basket/list" class="site-nav__link cart-link">
          🛒 <span id="cart-count" class="cart-count">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <form class="auth-card" id="signup-form">
      <h1 class="auth-title">회원가입</h1>
      <label>
        이름
        <input type="text" name="name" required placeholder="홍길동" />
      </label>
      <label>
        이메일
        <input type="email" name="email" required placeholder="you@example.com" />
      </label>
      <label>
        전화번호
        <input type="tel" name="phone" placeholder="010-0000-0000" />
      </label>
      <label>
        비밀번호
        <input type="password" name="password" required placeholder="••••••••" />
      </label>
      <label>
        비밀번호 확인
        <input type="password" name="passwordConfirm" required placeholder="••••••••" />
      </label>
      <button type="submit" class="btn btn-primary auth-submit">회원가입</button>
      <p class="auth-switch">
        이미 계정이 있으신가요? <a href="/auth/login">로그인</a>
      </p>
    </form>
  </main>

  <script src="/shared/cart.js"></script>
  <script src="signup.js"></script>
</body>
</html>
