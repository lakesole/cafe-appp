<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 | New Lake Coffee</title>
  <link rel="stylesheet" href="/shared/reset.css" />
  <link rel="stylesheet" href="/index.css" />
  <link rel="stylesheet" href="login.css" />
  <link rel="stylesheet" href="signup.css" />
</head>
<body>
  <header class="auth-header">
    <a href="/" class="auth-header__logo">New Lake Coffee</a>
  </header>

  <main class="auth-page">
    <form class="auth-card" id="signup-form">
      <h1 class="auth-title">회원가입</h1>
      <label>
        이름
        <input type="text" name="name" required placeholder="홍길동" />
      </label>
      <label>
        아이디
        <input type="text" name="username" required placeholder="영문/숫자로 된 아이디" autocomplete="username" />
      </label>
      <label>
        전화번호
        <input type="tel" name="phone" placeholder="010-0000-0000" />
      </label>
      <label>
        비밀번호
        <input type="password" name="password" required placeholder="••••••••" />
      </label>
      <label>
        비밀번호 확인
        <input type="password" name="passwordConfirm" required placeholder="••••••••" />
      </label>
      <button type="submit" class="btn btn-primary auth-submit">회원가입</button>
      <p class="auth-switch">
        이미 계정이 있으신가요? <a href="/auth/login">로그인</a>
      </p>
    </form>
  </main>

  <footer class="app-footer app-footer--standalone">
    <p>© <span id="footer-year"></span> New Lake Coffee. All rights reserved.</p>
  </footer>

  <script src="/shared/api.js"></script>
  <script src="/shared/auth.js"></script>
  <script src="/shared/cart.js"></script>
  <script src="signup.js"></script>
</body>
</html>
