<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 | New Lake Coffee</title>
  <link rel="stylesheet" href="/shared/reset.css" />
  <link rel="stylesheet" href="/index.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <header class="auth-header">
    <a href="/" class="auth-header__logo">New Lake Coffee</a>
  </header>

  <main class="auth-page">
    <form class="auth-card" id="login-form">
      <h1 class="auth-title">로그인</h1>
      <label>
        아이디
        <input type="text" name="username" required placeholder="아이디를 입력하세요" autocomplete="username" />
      </label>
      <label>
        비밀번호
        <input type="password" name="password" required placeholder="••••••••" />
      </label>
      <button type="submit" class="btn btn-primary auth-submit">로그인</button>
      <p class="auth-switch">
        아직 계정이 없으신가요? <a href="/auth/signup">회원가입</a>
      </p>
    </form>
  </main>

  <footer class="app-footer app-footer--standalone">
    <p>© <span id="footer-year"></span> New Lake Coffee. All rights reserved.</p>
  </footer>

  <script src="/shared/api.js"></script>
  <script src="/shared/auth.js"></script>
  <script src="/shared/cart.js"></script>
  <script src="login.js"></script>
</body>
</html>
